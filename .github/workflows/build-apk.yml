name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Copy HTML into APK assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/index.html

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.6 --distribution-type bin

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: STRM-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: "STRM APK — Build ${{ github.run_number }}"
          body: |
            ## Install on Firestick
            1. Install **Downloader** from Fire TV app store
            2. Open Downloader → enter the APK URL from Assets below
            3. Install → Open STRM
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

plugins {
    id "com.android.application"
}
android {
    namespace "com.strm.app"
    compileSdk 34
    defaultConfig {
        applicationId "com.strm.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildTypes {
        debug { applicationIdSuffix ".debug" }
    }
}